<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tienda Consony</title>
    <link rel="stylesheet" href="../styleLogin.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="header">
                <h2>Inicio de Sesión</h2>
                <p>Tienda Consony</p>
            </div>
            
            <!-- Formulario apuntando al backend -->
            <form action="/login" method="post">
                <div class="form__group">
                    <input type="text" class="form__field" name="usuario" placeholder="Usuario" required>
                    <label for="usuario" class="form__label">Usuario</label>
                </div>

                <div class="form__group">
                    <input type="password" class="form__field" name="password" placeholder="Contraseña" required>
                    <label for="password" class="form__label">Contraseña</label>
                </div>

                <button type="submit" class="login-btn">Ingresar a la tienda</button>

                <p id="mensaje">
                    <span th:text="${error}"></span>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
