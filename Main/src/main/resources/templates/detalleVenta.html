<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Ventas</title>
    <link rel="stylesheet" href="../static/styleEntidades.css">
</head>
<body>
    <header class="navbar">
        <h1>Detalle de Ventas</h1>
        <button type="button" onclick="regresar()">Regresar</button>
    </header>

    <section class="formulario">
        <h2>Agregar Detalle</h2>
        <form action="#" method="post">
            <label for="codigo_detalle_venta">Código:</label>
            <input type="number" id="codigo_detalle_venta" name="codigo_detalle_venta" placeholder="Código del detalle">

            <label for="cantidad">Cantidad:</label>
            <input type="number" id="cantidad" name="cantidad" placeholder="Cantidad de productos">

            <label for="precio_unitario">Precio Unitario:</label>
            <input type="number" step="0.01" id="precio_unitario" name="precio_unitario" placeholder="Precio unitario">

            <label for="subtotal">Subtotal:</label>
            <input type="number" step="0.01" id="subtotal" name="subtotal" placeholder="Subtotal">

            <label for="productos_codigo_producto">Código Producto:</label>
            <input type="number" id="productos_codigo_producto" name="productos_codigo_producto" placeholder="Código del producto">

            <label for="ventas_codigo_venta">Código Venta:</label>
            <input type="number" id="ventas_codigo_venta" name="ventas_codigo_venta" placeholder="Código de la venta">

            <button type="submit">Agregar</button>
        </form>
    </section>

    <section class="lista-detalle-ventas">
        <h2>Lista de Detalles</h2>
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Cantidad</th>
                    <th>Precio Unitario</th>
                    <th>Subtotal</th>
                    <th>Código Producto</th>
                    <th>Código Venta</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Ejemplo -->
                <tr>
                    <td>9001</td>
                    <td>2</td>
                    <td>50.00</td>
                    <td>100.00</td>
                    <td>101</td>
                    <td>5001</td>
                    <td>
                        <button type="button">Editar</button>
                        <button type="button">Eliminar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <script>
    function regresar() {
    window.location.replace("inicio.html");
    }

    function ir(pagina) {
    window.location.href = pagina;
    }
    </script>
</body>
</html>
