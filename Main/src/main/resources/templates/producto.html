<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-straight/css/uicons-regular-straight.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styleEntidades.css}">
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-header">
        <i class="fas fa-store"></i> Tienda Consony
    </div>
    <nav>
        <ul>
            <li>
                <a class="active" th:href="@{/inicio}">
                    <i class="fas fa-chart-line"></i> Inicio
                </a>
            </li>

            <li>
                <a th:href="@{/venta}">
                    <i class="fas fa-shopping-cart"></i> Ventas
                </a>
            </li>

            <li>
                <a th:href="@{/producto}">
                    <i class="fas fa-box"></i> Productos
                </a>
            </li>

            <li>
                <a th:href="@{/cliente}">
                    <i class="fas fa-users"></i> Clientes
                </a>
            </li>

            <li>
                <a th:href="@{/lista}">
                    <i class="fas fa-user-shield"></i> Usuarios
                </a>
            </li>

            <li>
                <a th:href="@{/detalleVenta}">
                    <i class="fas fa-file-invoice"></i> Detalle Venta
                </a>
            </li>

            <li>
                <a th:href="@{/logout}">
                    <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                </a>
            </li>
        </ul>
    </nav>
</aside>

<div class="container">

    <div class="card">

        <h1>Productos</h1>
        <div class="button-container">
            <a th:href="@{/agregarProducto}" class="btn">Agregar Producto</a>
        </div>

        <table class="tabla-datos">
            <thead>
            <tr>
                <th>Codigo de Producto</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="producto : ${productos}">

                <td th:text="${producto.codigoProducto}"></td>
                <td th:text="${producto.nombreProducto}"></td>
                <td th:text="${producto.precioProducto}"></td>
                <td th:text="${producto.stockProducto}"></td>

                <td>
                    <a th:href="@{'/editarProducto/' + ${producto.codigoProducto}}" class="btn-edit">Editar</a>
                    <a th:href="@{'/eliminarProducto/' + ${producto.codigoProducto}}" class="btn-delete">Eliminar</a>
                </td>

            </tr>
            </tbody>
        </table>

    </div>

</div>
</body>
</html>
