<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-straight/css/uicons-regular-straight.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/styleEntidades.css}">
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-header">
        <i class="fas fa-store"></i> Sistema Ventas
    </div>
    <nav>
        <ul>
            <li>
                <a class="active" th:href="@{/inicio}">
                    <i class="fas fa-chart-line"></i> Inicio
                </a>
            </li>

            <li>
                <a th:href="@{/venta}">
                    <i class="fas fa-shopping-cart"></i> Ventas
                </a>
            </li>

            <li>
                <a th:href="@{/producto}">
                    <i class="fas fa-box"></i> Productos
                </a>
            </li>

            <li>
                <a th:href="@{/cliente}">
                    <i class="fas fa-users"></i> Clientes
                </a>
            </li>

            <li>
                <a th:href="@{/usuario}">
                    <i class="fas fa-user-shield"></i> Usuarios
                </a>
            </li>

            <li>
                <a th:href="@{/detalleVenta}">
                    <i class="fas fa-file-invoice"></i> Detalle Venta
                </a>
            </li>

            <li>
                <a th:href="@{/logout}">
                    <i class="fas fa-sign-out-alt"></i> Cerrar sesión
                </a>
            </li>
        </ul>
    </nav>
</aside>

<div class="container">
    <div>
        <a th:href="@{/agregarProducto}" class="btn">Agregar Producto</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>Codigo de Producto</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>485</td>
            <td>Producto 1</td>
            <td>100.00</td>
            <td>50</td>
            <td class="estado-activo">Activo</td>
            <td class="acciones">
                <a th:href="@{/editarProducto}" class="btn-editar"><i class="fi fi-rs-pencil"></i></a>
                <a class="btn-eliminar"><i class="fi fi-rs-trash"></i></a>
            </td>
        </tr>
        <tr>
            <td>78951</td>
            <td>Producto 2</td>
            <td>200.00</td>
            <td>30</td>
            <td class="estado-inactivo">Inactivo</td>
            <td class="acciones">
                <a th:href="@{/editarProducto}" class="btn-editar"><i class="fi fi-rs-pencil"></i></a>
                <a class="btn-eliminar"><i class="fi fi-rs-trash"></i></a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
