<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link rel="stylesheet" href="../static/styleEntidades.css">
</head>
<body>
    <header class="navbar">
        <h1>Productos</h1>
        <button type="button" onclick="regresar()">Regresar</button>
    </header>

    <section class="formulario">
        <h2>Agregar Producto</h2>
        <form action="#" method="post">
            <label for="codigo_producto">Código:</label>
            <input type="number" id="codigo_producto" name="codigo_producto" placeholder="Código del producto">

            <label for="nombre_producto">Nombre:</label>
            <input type="text" id="nombre_producto" name="nombre_producto" placeholder="Nombre del producto">

            <label for="precio">Precio:</label>
            <input type="number" step="0.01" id="precio" name="precio" placeholder="Precio del producto">

            <label for="stock">Stock:</label>
            <input type="number" id="stock" name="stock" placeholder="Cantidad en stock">

            <label for="estado">Estado:</label>
            <input type="number" id="estado" name="estado" placeholder="1=activo, 0=inactivo">

            <button type="submit">Agregar</button>
        </form>
    </section>

    <section class="lista-productos">
        <h2>Lista de Productos</h2>
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Ejemplo -->
                <tr>
                    <td>101</td>
                    <td>Producto A</td>
                    <td>25.50</td>
                    <td>10</td>
                    <td>1</td>
                    <td>
                        <button type="button">Editar</button>
                        <button type="button">Eliminar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>
        <script>
    function regresar() {
    window.location.replace("inicio.html");
    }

    function ir(pagina) {
    window.location.href = pagina;
    }
</script>
</body>
</html>
