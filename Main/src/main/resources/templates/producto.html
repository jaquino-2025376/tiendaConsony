<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Productos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styleEntidades.css}">
    <link rel="stylesheet" th:href="@{/css/styleForms.css}">
</head>
<body class="with-header">
<div th:replace="~{fragments/headerRoles :: headerRoles}"></div>
<aside class="sidebar">
    <div class="sidebar-header"><i class="fas fa-store"></i> Tienda Consony</div>
    <nav><ul>
        <li><a th:href="@{/inicio}"><i class="fas fa-chart-line"></i> Inicio</a></li>
        <li><a th:href="@{/venta}"><i class="fas fa-shopping-cart"></i> Ventas</a></li>
        <li><a class="active" th:href="@{/producto}"><i class="fas fa-box"></i> Productos</a></li>
        <li><a th:href="@{/cliente}"><i class="fas fa-users"></i> Clientes</a></li>
        <li><a th:href="@{/lista}"><i class="fas fa-user-shield"></i> Usuarios</a></li>
        <li><a th:href="@{/detalleVenta}"><i class="fas fa-file-invoice"></i> Detalle Venta</a></li>
        <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a></li>
    </ul></nav>
</aside>
<div class="container">
    <div class="card">
        <h1>Productos</h1>
        <p>Listado de productos registrados en el sistema</p>
        <div class="button-container">
            <a th:href="@{/agregarProducto}" class="btn">Agregar Producto</a>
        </div>
        <table class="tabla-datos">
            <thead>
                <tr>
                    <th>Código</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="producto : ${productos}">
                    <td th:text="${producto.codigoProducto}"></td>
                    <td th:text="${producto.nombreProducto}"></td>
                    <td th:text="${producto.precioProducto}"></td>
                    <td th:text="${producto.stockProducto}"></td>
                    <td>
                        <a th:href="@{'/editarProducto/' + ${producto.codigoProducto}}" class="btn-edit">Editar</a>
                        <a th:href="@{'/eliminarProducto/' + ${producto.codigoProducto}}" class="btn-delete"
                           onclick="return confirm('¿Eliminar este producto?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
