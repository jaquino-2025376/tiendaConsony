<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Usuarios</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background: #0f172a; /* 🔥 fondo oscuro elegante */
            color: #e2e8f0;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #020617; /* negro profundo */
            padding: 20px;
            border-right: 1px solid #1e293b;
        }

        .sidebar h2 {
            margin-bottom: 30px;
            color: #38bdf8;
        }

        .sidebar a {
            display: block;
            color: #cbd5f5;
            text-decoration: none;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: #38bdf8;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 30px;
        }

        h2 {
            margin-bottom: 20px;
            color: #38bdf8;
        }

        /* BUSCADOR */
        .search-box input {
            width: 300px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #1e293b;
            color: white;
        }

        /* TABLA */
        table {
            width: 100%;
            border-collapse: collapse;
            background: #020617;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }

        thead {
            background: #1d4ed8;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #020617;
        }

        tr:nth-child(odd) {
            background: #0f172a;
        }

        tr:hover {
            background: #1e293b;
            transition: 0.3s;
        }

        /* BOTÓN ELIMINAR */
        .btn-delete {
            background: #ef4444;
            color: white;
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        /* BOTÓN GENERAL */
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2><i class="fas fa-user-cog"></i> Sistema</h2>
    <a href="#"><i class="fas fa-users"></i> Usuarios</a>
    <a href="/usuario"><i class="fas fa-sign-out-alt"></i> Cerrar Sesion</a>
</div>

<!-- MAIN -->
<div class="main">

    <h2><i class="fas fa-users"></i> Gestión de Usuarios</h2>

    <!-- BUSCADOR -->
    <div class="search-box">
        <input type="text" id="buscar" placeholder="Buscar usuario..." onkeyup="filtrarTabla()">
    </div>

    <!-- TABLA -->
    <table id="tablaUsuarios">
        <thead>
        <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Acción</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="u : ${usuarios}">
            <td th:text="${u.idUsuario}"></td>
            <td th:text="${u.usuario}"></td>
            <td>
                <a th:href="@{'/eliminar/' + ${u.idUsuario}}">
                    <button class="btn-delete">
                        <i class="fas fa-trash"></i>
                    </button>
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<script>
    function filtrarTabla() {
        let input = document.getElementById("buscar").value.toLowerCase();
        let filas = document.querySelectorAll("#tablaUsuarios tbody tr");

        filas.forEach(fila => {
            let texto = fila.innerText.toLowerCase();
            fila.style.display = texto.includes(input) ? "" : "none";
        });
    }
</script>

</body>
</html>
