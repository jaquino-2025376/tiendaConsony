<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Editar Detalle Venta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styleEntidades.css}">
    <link rel="stylesheet" th:href="@{/css/styleForms.css}">
</head>
<body class="with-header">
<div th:replace="~{fragments/headerRoles :: headerRoles}"></div>
<aside class="sidebar">
    <div class="sidebar-header"><i class="fas fa-store"></i> Tienda Consony</div>
    <nav><ul>
        <li><a th:href="@{/inicio}"><i class="fas fa-chart-line"></i> Inicio</a></li>
        <li><a th:href="@{/venta}"><i class="fas fa-shopping-cart"></i> Ventas</a></li>
        <li><a th:href="@{/producto}"><i class="fas fa-box"></i> Productos</a></li>
        <li><a th:href="@{/cliente}"><i class="fas fa-users"></i> Clientes</a></li>
        <li><a th:href="@{/lista}"><i class="fas fa-user-shield"></i> Usuarios</a></li>
        <li><a class="active" th:href="@{/detalleVenta}"><i class="fas fa-file-invoice"></i> Detalle Venta</a></li>
        <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a></li>
    </ul></nav>
</aside>
<div class="container">
    <div class="form-card">
        <h1><i class="fas fa-edit" style="color:#2563eb;margin-right:10px;"></i>Editar Detalle de Venta</h1>
        <p>Modifica los datos del detalle</p>
        <form th:action="@{'/editarDetalleVenta/' + ${detalle.codigoDetalleVenta}}" method="post">
            <div class="form-group">
                <label>Código Detalle</label>
                <input type="text" th:value="${detalle.codigoDetalleVenta}" readonly style="background:#e2e8f0;cursor:not-allowed;">
            </div>
            <div class="form-group">
                <label for="cantidad">Cantidad</label>
                <input type="number" id="cantidad" name="cantidad" th:value="${detalle.cantidad}" min="1" required>
            </div>
            <div class="form-group">
                <label for="precioUnitario">Precio Unitario (Q)</label>
                <input type="number" id="precioUnitario" name="precioUnitario" th:value="${detalle.precioUnitario}" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label for="subtotal">Subtotal (Q)</label>
                <input type="number" id="subtotal" name="subtotal" th:value="${detalle.subtotal}" step="0.01" min="0">
            </div>
            <div class="form-group">
                <label for="productoId">Producto</label>
                <select id="productoId" name="productoId" required>
                    <option value="">-- Selecciona un producto --</option>
                    <option th:each="p : ${productos}"
                            th:value="${p.codigoProducto}"
                            th:selected="${p.codigoProducto == detalle.productoId}"
                            th:text="${p.nombreProducto + ' (Q' + p.precioProducto + ')'}"></option>
                </select>
            </div>
            <div class="form-group">
                <label for="ventaId">Venta</label>
                <select id="ventaId" name="ventaId" required>
                    <option value="">-- Selecciona una venta --</option>
                    <option th:each="v : ${ventas}"
                            th:value="${v.codigoVenta}"
                            th:selected="${v.codigoVenta == detalle.ventaId}"
                            th:text="${'Venta #' + v.codigoVenta}"></option>
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Actualizar</button>
                <a th:href="@{/detalleVenta}" class="btn-cancel"><i class="fas fa-arrow-left" style="margin-right:6px;"></i> Cancelar</a>
            </div>
        </form>
    </div>
</div>
<script>
    const cantidad = document.getElementById('cantidad');
    const precio   = document.getElementById('precioUnitario');
    const subtotal = document.getElementById('subtotal');
    function calcular() {
        subtotal.value = ((parseFloat(cantidad.value)||0) * (parseFloat(precio.value)||0)).toFixed(2);
    }
    cantidad.addEventListener('input', calcular);
    precio.addEventListener('input', calcular);
</script>
</body>
</html>
