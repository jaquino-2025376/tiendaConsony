<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ventas</title>
    <link rel="stylesheet" href="../static/styleEntidades.css">
</head>
<body>
    <header class="navbar">
        <h1>Ventas</h1>
        <button type="button">Regresar</button>
    </header>

    <section class="formulario">
        <h2>Agregar Venta</h2>
        <form action="#" method="post">
            <label for="codigo_venta">Código:</label>
            <input type="number" id="codigo_venta" name="codigo_venta" placeholder="Código de la venta">

            <label for="fecha_venta">Fecha:</label>
            <input type="date" id="fecha_venta" name="fecha_venta">

            <label for="total">Total:</label>
            <input type="number" step="0.01" id="total" name="total" placeholder="Total de la venta">

            <label for="estado">Estado:</label>
            <input type="number" id="estado" name="estado" placeholder="1=activo, 0=inactivo">

            <label for="clientes_dpi_cliente">DPI Cliente:</label>
            <input type="number" id="clientes_dpi_cliente" name="clientes_dpi_cliente" placeholder="DPI del cliente">

            <label for="usuarios_codigo_usuario">Código Usuario:</label>
            <input type="number" id="usuarios_codigo_usuario" name="usuarios_codigo_usuario" placeholder="Código del usuario">

            <button type="submit">Agregar</button>
        </form>
    </section>

    <section class="lista-ventas">
        <h2>Lista de Ventas</h2>
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Fecha</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th>DPI Cliente</th>
                    <th>Código Usuario</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Ejemplo -->
                <tr>
                    <td>5001</td>
                    <td>2026-04-08</td>
                    <td>150.00</td>
                    <td>1</td>
                    <td>201574893001</td>
                    <td>1</td>
                    <td>
                        <button type="button">Editar</button>
                        <button type="button">Eliminar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>
</body>
</html>
