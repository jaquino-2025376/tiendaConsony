<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>
    <link rel="stylesheet" href="../static/styleEntidades.css">
</head>
<body>
    <header class="navbar">
        <h1>Usuarios</h1>
        <button type="button" onclick="regresar()">Regresar</button>
    </header>

    <section class="formulario">
        <h2>Agregar Usuario</h2>
        <form action="#" method="post">
            <label for="codigo_usuario">Código:</label>
            <input type="number" id="codigo_usuario" name="codigo_usuario" placeholder="Código del usuario">

            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" placeholder="Nombre de usuario">

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" placeholder="Contraseña">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Correo electrónico">

            <label for="rol">Rol:</label>
            <input type="text" id="rol" name="rol" placeholder="Rol del usuario">

            <label for="estado">Estado:</label>
            <input type="number" id="estado" name="estado" placeholder="1=activo, 0=inactivo">

            <button type="submit">Agregar</button>
        </form>
    </section>

    <section class="lista-usuarios">
        <h2>Lista de Usuarios</h2>
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Ejemplo de registro -->
                <tr>
                    <td>1</td>
                    <td>admin</td>
                    <td>admin@example.com</td>
                    <td>Administrador</td>
                    <td>1</td>
                    <td>
                        <button type="button">Editar</button>
                        <button type="button">Eliminar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

        <script>
    function regresar() {
    window.location.replace("inicio.html");
    }

    function ir(pagina) {
    window.location.href = pagina;
    }
</script>
</body>
</html>
