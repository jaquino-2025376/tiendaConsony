<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clientes - CRUD</title>
    <!-- Aquí enlazas tu CSS externo -->
    <link rel="stylesheet" href="../static/styleEntidades.css">
</head>
<body>
    <header class="navbar">
        <h1>Clientes</h1>
        <button type="button">Regresar</button>
    </header>

    <section class="formulario">
        <h2>Agregar Cliente</h2>
        <form action="#" method="post">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Nombre del cliente">

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" placeholder="Apellido del cliente">

            <label for="dpi">DPI:</label>
            <input type="text" id="dpi" name="dpi" placeholder="DPI del cliente">

            <label for="direccion">Dirección:</label>
            <input type="text" id="direccion" name="direccion" placeholder="Dirección del cliente">

            <button type="submit">Agregar</button>
        </form>
    </section>

    <section class="lista-clientes">
        <h2>Lista de Clientes</h2>
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>DPI</th>
                    <th>Dirección</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Ejemplos -->
                <tr>
                    <td>Juan</td>
                    <td>Pérez</td>
                    <td>201574893001</td>
                    <td>Zona 15</td>
                    <td>
                        <button type="button">Editar</button>
                        <button type="button">Eliminar</button>
                    </td>
                </tr>
                <tr>
                    <td>Kevin</td>
                    <td>Larios</td>
                    <td>2352441545154</td>
                    <td>Zona 2</td>
                    <td>
                        <button type="button">Editar</button>
                        <button type="button">Eliminar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>
</body>
</html>
