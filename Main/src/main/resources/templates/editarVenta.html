<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Editar Venta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styleEntidades.css}">
    <link rel="stylesheet" th:href="@{/css/styleForms.css}">
</head>
<body class="with-header">
<div th:replace="~{fragments/headerRoles :: headerRoles}"></div>
<aside class="sidebar">
    <div class="sidebar-header"><i class="fas fa-store"></i> Tienda Consony</div>
    <nav><ul>
        <li><a th:href="@{/inicio}"><i class="fas fa-chart-line"></i> Inicio</a></li>
        <li><a class="active" th:href="@{/venta}"><i class="fas fa-shopping-cart"></i> Ventas</a></li>
        <li><a th:href="@{/producto}"><i class="fas fa-box"></i> Productos</a></li>
        <li><a th:href="@{/cliente}"><i class="fas fa-users"></i> Clientes</a></li>
        <li><a th:href="@{/lista}"><i class="fas fa-user-shield"></i> Usuarios</a></li>
        <li><a th:href="@{/detalleVenta}"><i class="fas fa-file-invoice"></i> Detalle Venta</a></li>
        <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a></li>
    </ul></nav>
</aside>
<div class="container">
    <div class="form-card">
        <h1><i class="fas fa-edit" style="color:#2563eb;margin-right:10px;"></i>Editar Venta</h1>
        <p>Modifica los datos de la venta</p>
        <form th:action="@{'/editarVenta/' + ${venta.codigoVenta}}" method="post">
            <div class="form-group">
                <label>Código Venta</label>
                <input type="text" th:value="${venta.codigoVenta}" readonly style="background:#e2e8f0;cursor:not-allowed;">
            </div>
            <div class="form-group">
                <label for="fechaVenta">Fecha de Venta</label>
                <input type="datetime-local" id="fechaVenta" name="fechaVenta" th:value="${#temporals.format(venta.fechaVenta,'yyyy-MM-dd''T''HH:mm')}" required>
            </div>
            <div class="form-group">
                <label for="totalVenta">Total (Q)</label>
                <input type="number" id="totalVenta" name="totalVenta" th:value="${venta.totalVenta}" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label for="fkCodigoCliente">Cliente</label>
                <select id="fkCodigoCliente" name="fkCodigoCliente" required>
                    <option value="">-- Selecciona un cliente --</option>
                    <option th:each="c : ${clientes}"
                            th:value="${c.codigoCliente}"
                            th:selected="${c.codigoCliente == venta.fkCodigoCliente}"
                            th:text="${c.nombreCliente + ' ' + c.apellidoCliente}"></option>
                </select>
            </div>
            <div class="form-group">
                <label for="fkCodigoUsuario">Usuario</label>
                <select id="fkCodigoUsuario" name="fkCodigoUsuario" required>
                    <option value="">-- Selecciona un usuario --</option>
                    <option th:each="u : ${usuarios}"
                            th:value="${u.idUsuario}"
                            th:selected="${u.idUsuario == venta.fkCodigoUsuario}"
                            th:text="${u.username}"></option>
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Actualizar</button>
                <a th:href="@{/venta}" class="btn-cancel"><i class="fas fa-arrow-left" style="margin-right:6px;"></i> Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
