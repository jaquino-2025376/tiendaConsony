<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Editar Producto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styleEntidades.css}">
    <link rel="stylesheet" th:href="@{/css/styleForms.css}">
</head>
<body class="with-header">
<div th:replace="~{fragments/headerRoles :: headerRoles}"></div>
<aside class="sidebar">
    <div class="sidebar-header"><i class="fas fa-store"></i> Tienda Consony</div>
    <nav><ul>
        <li><a th:href="@{/inicio}"><i class="fas fa-chart-line"></i> Inicio</a></li>
        <li><a th:href="@{/venta}"><i class="fas fa-shopping-cart"></i> Ventas</a></li>
        <li><a class="active" th:href="@{/producto}"><i class="fas fa-box"></i> Productos</a></li>
        <li><a th:href="@{/cliente}"><i class="fas fa-users"></i> Clientes</a></li>
        <li><a th:href="@{/lista}"><i class="fas fa-user-shield"></i> Usuarios</a></li>
        <li><a th:href="@{/detalleVenta}"><i class="fas fa-file-invoice"></i> Detalle Venta</a></li>
        <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a></li>
    </ul></nav>
</aside>
<div class="container">
    <div class="form-card">
        <h1><i class="fas fa-edit" style="color:#2563eb;margin-right:10px;"></i>Editar Producto</h1>
        <p>Modifica los datos del producto</p>
        <form th:action="@{'/editarProducto/' + ${producto.codigoProducto}}" method="post">
            <div class="form-group">
                <label>Código</label>
                <input type="text" th:value="${producto.codigoProducto}" readonly style="background:#e2e8f0;cursor:not-allowed;">
            </div>
            <div class="form-group">
                <label for="nombreProducto">Nombre del Producto</label>
                <input type="text" id="nombreProducto" name="nombreProducto" th:value="${producto.nombreProducto}" required>
            </div>
            <div class="form-group">
                <label for="precioProducto">Precio (Q)</label>
                <input type="number" id="precioProducto" name="precioProducto" th:value="${producto.precioProducto}" step="0.01" min="0" required>
            </div>
            <div class="form-group">
                <label for="stockProducto">Stock</label>
                <input type="number" id="stockProducto" name="stockProducto" th:value="${producto.stockProducto}" min="0" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-save"><i class="fas fa-save"></i> Actualizar</button>
                <a th:href="@{/producto}" class="btn-cancel"><i class="fas fa-arrow-left" style="margin-right:6px;"></i> Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
